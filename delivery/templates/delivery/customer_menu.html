<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">Meal Buddy</a>
        <div class="user-nav">
            <span>Welcome, <strong>{{username}}</strong>!</span>
            <a href="{% url 'show_cart' username %}" class="btn" style="margin-left: 1rem; padding: 0.5rem 1rem; font-size: 0.9rem;">Go to Cart 🛒</a>
        </div>
    </header>

    <div class="container">
        <h3>Menu</h3>

        <table border="1">
            <thead>
                <tr>
                    <th>Item name</th>
                    <th>Picture</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Is veg?</th>
                    <th>Operation</th>
                </tr>
            </thead>
            <tbody>
                {%  for item in itemList %}
                    <tr>
                        <td>{{ item.name }}</td>
                        <td>
                            <img src="{{ item.picture }}" alt="{{ item.name }}">
                        </td>
                        <td>{{ item.description }}</td>
                        <td>₹{{ item.price }}</td>
                        <td>{% if item.vegeterian %}🟢 Veg{% else %}🔴 Non-Veg{% endif %}</td>
                        <td>
                            <div class="cart-control" data-item-id="{{ item.id }}">
                                <button class="btn add-btn" onclick="addToCart({{ item.id }})">ADD</button>
                                <div class="qty-btn-group" style="display: none;">
                                    <button class="btn-qty minus" onclick="removeFromCart({{ item.id }})">−</button>
                                    <span class="qty-val">0</span>
                                    <button class="btn-qty plus" onclick="addToCart({{ item.id }})">+</button>
                                </div>
                            </div>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        const cartQuantities = {{ json_cart_quantities|safe }};
        const username = "{{ username }}";

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".cart-control").forEach(control => {
                const itemId = parseInt(control.getAttribute("data-item-id"));
                const qty = cartQuantities[itemId] || 0;
                updateControlUI(control, qty);
            });
        });

        function updateControlUI(control, qty) {
            const addBtn = control.querySelector(".add-btn");
            const qtyGroup = control.querySelector(".qty-btn-group");
            const qtyVal = control.querySelector(".qty-val");

            if (qty > 0) {
                addBtn.style.display = "none";
                qtyGroup.style.display = "flex";
                qtyVal.textContent = qty;
            } else {
                addBtn.style.display = "block";
                qtyGroup.style.display = "none";
                qtyVal.textContent = "0";
            }
        }

        function addToCart(itemId) {
            const url = `/add_to_cart/${itemId}/${username}?ajax=1`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const control = document.querySelector(`.cart-control[data-item-id="${itemId}"]`);
                        updateControlUI(control, data.quantity);
                    }
                })
                .catch(err => console.error("Error adding to cart:", err));
        }

        function removeFromCart(itemId) {
            const url = `/remove_from_cart/${itemId}/${username}?ajax=1`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const control = document.querySelector(`.cart-control[data-item-id="${itemId}"]`);
                        updateControlUI(control, data.quantity);
                    }
                })
                .catch(err => console.error("Error removing from cart:", err));
        }
    </script>
</body>
</html>
